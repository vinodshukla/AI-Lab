name: Sync to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # updated for Node.js 24

      - name: Upload to Hugging Face Space
        run: |
          git config --global user.email "vinodshukla1608@gmail.com"
          git config --global user.name "vinodshukla1608"
          git remote add hf https://vinodshukla1608:${HF_TOKEN}@huggingface.co/spaces/vinodshukla1608/text-summarizer-research
          git push hf main --force
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
